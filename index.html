const fmtTime = iso => { const d=new Date(iso); return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`; };
const fmtRelTime = iso => {
  const now=new Date(),d=new Date(iso),diff=now-d;

// 명단 파싱
const parseMembers = text => {
  const lines=text.split(/\n/).map(l=>l.trim()).filter(Boolean);
  const result=[]; const seen=new Set();
  const isSid=t=>/^\d{4,12}$/.test(t);
  lines.forEach(line=>{
    const tokens=line.split(/[\t,，\s]+/).map(t=>t.trim()).filter(Boolean);
    const names=tokens.filter(t=>!isSid(t));
    const sids=tokens.filter(t=>isSid(t));
    // 이름 1개일 때만 sid 매핑, 이름 2개 이상이면 sid 무시
    names.forEach((name,i)=>{
      const sid=names.length===1?(sids[0]||''):'';
      const key=name+(sid?`_${sid}`:'');
      if(!seen.has(key)){seen.add(key);result.push({name,sid});}
    });
  });
  return result;
};

// 송금 딥링크
const BANK_CODES={'카카오뱅크':'090','카카오':'090','국민':'004','국민은행':'004','KB국민':'004','신한':'088','신한은행':'088','우리':'020','우리은행':'020','하나':'081','하나은행':'081','농협':'011','NH농협':'011','기업':'003','IBK기업':'003','SC제일':'023','씨티':'027','대구':'031','부산':'032','경남':'039','광주':'034','전북':'037','제주':'035','수협':'007','새마을금고':'045','새마을':'045','신협':'048','우체국':'071','토스뱅크':'092','토스':'092','케이뱅크':'089','K뱅크':'089'};

// 정산 계산 (순수 함수)
const calcAmounts = ev => {
  const presentMembers=(ev.members||[]).filter(k=>ev.attendance[k]!==false);
  const a={};
  presentMembers.forEach(k=>a[k]=0);
  const fc=ev.feeConfig;
  (ev.rounds||[]).forEach(r=>{
    const isFeeRound=r.id==='round_1'&&fc?.paidFeeAmount!=null&&(fc.paidFeeAmount||fc.unpaidFeeAmount);
    if(!isFeeRound&&!r.amount) return;
    const totalCount=(r.members?.length||0)+(r.extraMembers?.length||0);
    if(!totalCount) return;
    if(isFeeRound){
      (r.members||[]).forEach(k=>{
        if(a[k]!==undefined)
          a[k]+=(ev.paidFeeKeys||[]).includes(k)?(fc.paidFeeAmount||0):(fc.unpaidFeeAmount||0);
      });
    } else {
      const share=Math.ceil(r.amount/totalCount);
      (r.members||[]).forEach(k=>{if(a[k]!==undefined)a[k]+=share;});
    }
  });
  return a;
};
const calcSurplus = ev => {
  let s=0;
  (ev.rounds||[]).forEach(r=>{
    if(!r.amount) return;
    const n=(r.members?.length||0)+(r.extraMembers?.length||0);
    if(!n) return;
    s+=Math.ceil(r.amount/n)*n-r.amount;
  });
  return s;
};
const isEventDone = ev => {
  const presentMembers=(ev.members||[]).filter(k=>ev.attendance[k]!==false);
  if(presentMembers.length===0) return false;
  return presentMembers.every(k=>ev.payments?.[k]?.paid);
};

};

// 입금 완료(시각 최신순) → 미입금(원래 순서) 정렬
const sortByPaid = (keys, payments) => [
  ...keys.filter(k=>payments?.[k]?.paid).sort((a,b)=>{
    const ta=payments[a]?.time, tb=payments[b]?.time;
    if(!ta&&!tb) return 0; if(!ta) return 1; if(!tb) return -1;
    return new Date(tb)-new Date(ta);
  }),
  ...keys.filter(k=>!payments?.[k]?.paid),
];
// 최근 활동 시간순 (paid.time / requestedAt 중 max, 내림차순)
const sortByRequested = (keys, payments) => {
  const lastAct=k=>{const p=payments?.[k];const t1=p?.time?new Date(p.time):null;const t2=p?.requestedAt?new Date(p.requestedAt):null;if(!t1&&!t2)return null;if(!t1)return t2;if(!t2)return t1;return t1>t2?t1:t2;};
  return[...keys.filter(k=>lastAct(k)!==null).sort((a,b)=>lastAct(b)-lastAct(a)),...keys.filter(k=>lastAct(k)===null)];
};

// 입금 대조 매칭 엔진 (순수 함수)
const matchEngine = {
  NAME_COLS: ['적요','입금자','입금자명','보내는분','거래내용','기재내용','통장표시','비고','내용','메모','받는분'],
  AMT_COLS: ['입금','입금액','입금금액','거래금액','금액'],

  normalize: s => (s||'').replace(/[（(][^)）]*[)）]/g,'').replace(/[\s·\-]/g,''),

  compareName(depositor, applicant) {
    const d=this.normalize(depositor), a=this.normalize(applicant);
    if(!d||!a) return 'none';
    if(d===a) return 'exact';
    if(d.includes(a)||a.includes(d)) return 'partial';
    return 'none';
  },

  findCol(headers, candidates) {
    return headers.findIndex(h => candidates.some(c => h.includes(c)));
  },

  parseExcel(arrayBuffer) {
    const wb=XLSX.read(arrayBuffer);
    const ws=wb.Sheets[wb.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});

    let headerIdx=-1;
    for(let i=0;i<Math.min(rows.length,15);i++){
      const row=rows[i].map(c=>String(c));
      if(row.some(c=>this.NAME_COLS.some(n=>c.includes(n)))||row.some(c=>this.AMT_COLS.some(n=>c.includes(n)))){headerIdx=i;break;}
    }
    if(headerIdx===-1) return {error:'컬럼 인식 실패'};

    const headers=rows[headerIdx].map(c=>String(c).trim());
    const nameIdx=this.findCol(headers,this.NAME_COLS);
    const amtIdx=this.findCol(headers,this.AMT_COLS);
    if(nameIdx===-1) return {error:'입금자명 컬럼 없음'};

    const deposits=[];
    for(let i=headerIdx+1;i<rows.length;i++){
      const row=rows[i];
      const name=String(row[nameIdx]||'').trim();
      const amt=amtIdx>=0?Number(String(row[amtIdx]).replace(/[^0-9.-]/g,''))||0:0;
      if(name&&amt>0) deposits.push({name,amount:amt,row:i+1,matched:false});
    }
    return {deposits};
  },

  match(deposits, subs, expectedAmount) {
    const dupMap={};
    subs.forEach(s=>{const n=this.normalize(s.name||'');if(!dupMap[n])dupMap[n]=[];dupMap[n].push({name:s.name,studentId:s.studentId||''});});
    const getDups=s=>{const arr=dupMap[this.normalize(s.name||'')];return arr&&arr.length>1?arr:null;};

    const matched=[], amountMismatch=[], unpaid=[], refund=[];
    const subsCopy=subs.map(s=>({...s,_matched:false}));

    // 1차: 정확 매칭
    deposits.forEach(dep=>{
      const idx=subsCopy.findIndex(s=>!s._matched&&this.compareName(dep.name,s.name)==='exact'&&dep.amount===expectedAmount);
      if(idx>=0){matched.push({sub:subsCopy[idx],deposit:dep,type:'exact',duplicates:getDups(subsCopy[idx])});subsCopy[idx]._matched=true;dep.matched=true;}
    });
    // 2차: 이름 매칭 + 금액 불일치
    deposits.forEach(dep=>{
      if(dep.matched) return;
      const idx=subsCopy.findIndex(s=>!s._matched&&this.compareName(dep.name,s.name)==='exact');
      if(idx>=0){amountMismatch.push({sub:subsCopy[idx],deposit:dep,diff:dep.amount-expectedAmount,duplicates:getDups(subsCopy[idx])});subsCopy[idx]._matched=true;dep.matched=true;}
    });
    // 3차: 부분 매칭
    deposits.forEach(dep=>{
      if(dep.matched) return;
      const idx=subsCopy.findIndex(s=>!s._matched&&this.compareName(dep.name,s.name)==='partial');
      if(idx>=0){
        if(dep.amount===expectedAmount) matched.push({sub:subsCopy[idx],deposit:dep,type:'partial',duplicates:getDups(subsCopy[idx])});
        else amountMismatch.push({sub:subsCopy[idx],deposit:dep,diff:dep.amount-expectedAmount,duplicates:getDups(subsCopy[idx])});
        subsCopy[idx]._matched=true;dep.matched=true;
      }
    });

    subsCopy.filter(s=>!s._matched).forEach(s=>unpaid.push(s));
    deposits.filter(d=>!d.matched).forEach(d=>refund.push(d));
    return {matched,amountMismatch,unpaid,refund,totalDeposits:deposits.length};
  },
};

// ── App ────────────────────────────────────────────────────
function App() {
  const [ready,setReady]=useState(false);
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState({account:{bank:'',number:'',holder:''},groups:[],name:''});
  const [events,setEvents]=useState([]);
  const [forms,setForms]=useState([]);
  const [view,setView]=useState('home');
  const [currentCode,setCurrentCode]=useState('');
  const [currentFormCode,setCurrentFormCode]=useState('');
  const [participantKey,setParticipantKey]=useState('');
  const [toast,setToast]=useState(null);
  const [showGuide,setShowGuide]=useState(false);
  const [showOnboarding,setShowOnboarding]=useState(false);
  const [showFeedback,setShowFeedback]=useState(false);

  const showToast=(msg,color=C.green)=>{setToast({msg,color});setTimeout(()=>setToast(null),2500);};

  useEffect(()=>{
    // Google OAuth 콜백 처리 (hash fragment 제거)
    if(window.location.hash) window.history.replaceState({},'',window.location.pathname+window.location.search);

    const urlParams=new URLSearchParams(window.location.search);
    const urlCode=urlParams.get('code');
    const urlForm=urlParams.get('form');

    const {data:{subscription}}=api.onAuthChange((_evt,session)=>{
      if(!session){
        setUser(null);setEvents([]);setForms([]);
        setProfile({account:{bank:'',number:'',holder:''},groups:[],name:''});
        // 참여자 화면이면 유지
        setView(v=>['participantEvent','formSubmit'].includes(v)?v:'home');
        setReady(true);
        return;
      }
      // onboarding 체크 — 참여자 화면이면 표시 안 함
      if(_evt==='SIGNED_IN'||_evt==='INITIAL_SESSION'){
        const isParticipantView=['participantEvent','formSubmit'];
        if(!isParticipantView.some(v2=>view===v2||urlCode||urlForm)){
          api.getProfileFields(session.user.id,'onboarding_done,name').then(({data})=>{
            if(localStorage.getItem('onboarding_done_'+session.user.id)==='true') return;
            if(data?.onboarding_done===true) return;
            if(data?.name) setShowOnboarding(true);
          });
        }
      }
      loadUserData(session.user.id);
    });

    // 신청폼 URL 처리
    if(urlForm){
      const code=urlForm.toUpperCase();
      window.history.replaceState({},'',window.location.pathname);
      api.getFormByCode(code).then(({data,error})=>{
        if(data&&!error){setForms([rowToForm(data)]);setCurrentFormCode(code);setView('formSubmit');}
        setReady(true);
      }).catch(()=>setReady(true));
      return()=>subscription.unsubscribe();
    }

    if(urlCode){
      const code=urlCode.toUpperCase();
      const urlKey=urlParams.get('k')||'';
      window.history.replaceState({},'',window.location.pathname);
      api.getEventByCode(code).then(({data})=>{
        if(data){
          setEvents([rowToEv(data)]);setCurrentCode(code);
          if(urlKey) setParticipantKey(decodeURIComponent(urlKey));
          setView('participantEvent');
        }
        setReady(true);
      });
      return()=>subscription.unsubscribe();
    }

    api.getSession().then(({data:{session}})=>{
      if(!session){setUser(null);setReady(true);}
    });

    return()=>subscription.unsubscribe();
  },[]);

  const loadUserData=async(uid)=>{
    const [{data:evData},{data:profData}]=await Promise.all([
      api.getEvents(uid),
      api.getProfile(uid),
    ]);
    const formRes=await api.getForms(uid);
    const formData=formRes.data;
    const {data:{user:u}}=await api.getUser();
    setUser(u||null);
    if(evData) setEvents(evData.map(rowToEv));
    if(formData) setForms(formData.map(rowToForm));
    if(profData) setProfile({
      account:profData.account||{bank:'',number:'',holder:''},
      groups:profData.groups||[],
      name:profData.name||profData.username||'',
      school:profData.school||'',
      department:profData.department||'',
      role:profData.role||'',
      phone:profData.phone||'',
      username:profData.username||'',
    });
    setReady(true);
    // 참여자/신청폼 화면이면 유지, auth/빈값이면 홈으로
    setView(v=>['participantEvent','formSubmit'].includes(v)?v:(!v||v==='auth')?'home':v);
  };

  const saveProfile=async(prof)=>{
    const allPaidKeys=new Set((prof.groups||[]).flatMap(g=>g.paidFeeMembers||[]));
    const syncedEvents=events.map(ev=>({...ev,paidFeeKeys:ev.members.filter(k=>allPaidKeys.has(k))}));
    setEvents(syncedEvents);
    setProfile(prof);
    if(user?.id){
      const {error}=await api.upsertProfile({id:user.id,account:prof.account,groups:prof.groups,updated_at:new Date().toISOString()});
      if(error){showToast('저장 실패',C.red);return;}
      await Promise.all(syncedEvents.map(ev=>api.updateEvent(ev.code,evToRow(ev))));
    }
  };

  const createEvent=async(ev)=>{
    const {error}=await api.insertEvent(evToRow(ev,user.id));
    if(error){showToast('저장 실패: '+error.message,C.red);return false;}
    setEvents(evs=>[ev,...evs]);
    return true;
  };

  const updateEvent=async(ev)=>{
    const {error}=await api.updateEvent(ev.code,evToRow(ev));
    if(error){showToast('업데이트 실패',C.red);return;}
    setEvents(evs=>evs.map(e=>e.code===ev.code?ev:e));
  };

  const deleteEvent=async(code)=>{
    const {error}=await api.deleteEvent(code);
    if(error){showToast('삭제 실패',C.red);return;}
    setEvents(evs=>evs.filter(e=>e.code!==code));
  };

  // Form CRUD
  const createForm=async(form)=>{
    const {error}=await api.insertForm(formToRow(form,user.id));
    if(error){
      if(error.message?.includes('schema cache')||error.message?.includes('does not exist'))
        showToast('forms 테이블이 없어요. Supabase에서 SQL을 먼저 실행해주세요.',C.red);
      else showToast('저장 실패: '+error.message,C.red);
      return false;
    }
    setForms(fs=>[form,...fs]);
    return true;
  };

  const updateForm=async(form)=>{
    const {error}=await api.updateForm(form.code,formToRow(form));
    if(error){showToast('업데이트 실패: '+error.message,C.red);return;}
    setForms(fs=>fs.map(f=>f.code===form.code?form:f));
  };

  const deleteForm=async(code)=>{
    const {error}=await api.deleteForm(code);
    if(error){showToast('삭제 실패',C.red);return;}
    setForms(fs=>fs.filter(f=>f.code!==code));
  };

  const nav={setView,setCurrentCode,setCurrentFormCode,setParticipantKey,showToast,loadUserData};
  const currentEvent=events.find(e=>e.code===currentCode);

  if(!ready) return(
    <div className="screen" style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#fff',gap:12}}>
      <div style={{fontSize:48,marginBottom:4}}>🍻</div>
      <div style={{fontSize:22,fontWeight:900,color:C.text,letterSpacing:-0.5}}>정산해</div>
      <div style={{marginTop:8}}><Spinner size={24} color={C.accent}/></div>
    </div>
  );

  const currentForm=forms.find(f=>f.code===currentFormCode);

  return(
    <div className="screen" style={{fontFamily:"'Pretendard',-apple-system,sans-serif",background:C.pageBg,maxWidth:480,margin:'0 auto',color:C.text,paddingBottom:60}}>
      {!user&&view==='home'&&<LandingScreen nav={nav}/>}
      {!user&&view==='auth'&&<AuthScreen nav={nav} showToast={showToast} setShowOnboarding={setShowOnboarding}/>}
      {view==='participantEvent'&&currentEvent&&<ParticipantScreen nav={nav} event={currentEvent} updateEvent={updateEvent} participantKey={participantKey} showToast={showToast}/>}
      {view==='formSubmit'&&currentForm&&<FormSubmitScreen nav={nav} form={currentForm} updateForm={updateForm} showToast={showToast}/>}
      {user&&view==='home'&&<HomeScreen nav={nav} user={user} profile={profile} events={events} forms={forms} showToast={showToast} onGuide={()=>setShowGuide(true)} showFeedback={showFeedback} onFeedbackDone={()=>setShowFeedback(false)}/>}
      {user&&view==='setup'&&<SetupScreen nav={nav} profile={profile} saveProfile={saveProfile}/>}
      {user&&view==='create'&&<CreateScreen nav={nav} profile={profile} events={events} createEvent={createEvent} showToast={showToast}/>}
      {user&&view==='formCreate'&&<FormCreateScreen nav={nav} profile={profile} createForm={createForm}/>}
      {user&&view==='adminEvent'&&currentEvent&&<AdminEventScreen nav={nav} event={currentEvent} updateEvent={updateEvent} showToast={showToast} profile={profile}/>}
      {user&&view==='formAdmin'&&currentForm&&<FormAdminScreen nav={nav} form={currentForm} updateForm={updateForm} showToast={showToast} profile={profile} saveProfile={saveProfile} createEvent={createEvent}/>}
      {user&&view==='history'&&<HistoryScreen nav={nav} events={events} forms={forms} deleteEvent={deleteEvent} deleteForm={deleteForm}/>}
      {showGuide&&<GuideModal onClose={()=>setShowGuide(false)} onFeedback={()=>{setShowGuide(false);setShowFeedback(true);}}/>}
      {showOnboarding&&<OnboardingModal onClose={()=>setShowOnboarding(false)}/>}
      <Toast msg={toast?.msg} color={toast?.color}/>
    </div>
  );
}

// ── AuthScreen ─────────────────────────────────────────────
function AuthScreen({nav,showToast,setShowOnboarding=()=>{}}){
  const [mode,setMode]=useState('login');
  const [userId,setUserId]=useState('');
  const [pw,setPw]=useState('');
  const [pw2,setPw2]=useState('');
  const [name,setName]=useState('');
  const [org,setOrg]=useState('');
  const [dept,setDept]=useState('');
  const [role,setRole]=useState('');
  const [size,setSize]=useState('');
  const [freq,setFreq]=useState('');
  const [method,setMethod]=useState([]);
  const [referral,setReferral]=useState('');
  const [phone,setPhone]=useState('');
  const [marketing,setMarketing]=useState(false);
  const [privacyAgree,setPrivacyAgree]=useState(false);
  const [termsAgree,setTermsAgree]=useState(false);
  const [thirdPartyAgree,setThirdPartyAgree]=useState(false);
  const [legalModal,setLegalModal]=useState(null);
  const [loading,setLoading]=useState(false);
  const [idChecked,setIdChecked]=useState(false);
  const [idAvail,setIdAvail]=useState(null);
  const [err,setErr]=useState('');
  const [idChecking,setIdChecking]=useState(false);

  const toEmail = id => id.trim().toLowerCase()+ID_DOMAIN;

  const checkId = async(val)=>{
    const v=(val||userId).trim();
    if(!v||v.length<3) return;
    if(!/^[a-zA-Z0-9_]{3,20}$/.test(v)){setIdAvail(false);setIdChecked(true);setErr('영문, 숫자, _ 3~20자');return;}
    setIdChecking(true);
    const {data}=await api.checkUsername(v.toLowerCase());
    if(data){
      setIdAvail(false);setIdChecked(true);setErr('이미 사용 중인 아이디예요');
    } else {
      setIdAvail(true);setIdChecked(true);setErr('');
    }
    setIdChecking(false);
  };

  const submit=async()=>{
    setErr('');
    if(!userId.trim()||!pw){setErr('아이디와 비밀번호를 입력해주세요');return;}
    if(mode==='signup'){
      if(!idChecked||!idAvail){
        if(!idChecked&&userId.trim().length>=3){await checkId();return;}
        setErr('사용 가능한 아이디를 입력해주세요');return;
      }
      if(pw!==pw2){setErr('비밀번호가 일치하지 않아요');return;}
      if(pw.length<6){setErr('비밀번호는 6자 이상이어야 해요');return;}
      if(!name.trim()){setErr('이름을 입력해주세요');return;}
      if(!org.trim()){setErr('학교/단체명을 입력해주세요');return;}
      if(!privacyAgree||!termsAgree||!thirdPartyAgree){setErr('필수 약관에 모두 동의해주세요');return;}
    }
    setLoading(true);
    const email=toEmail(userId);
    if(mode==='login'){
      const {error}=await api.signIn(email,pw);
      if(error){setErr('아이디 또는 비밀번호가 틀렸어요');setLoading(false);return;}
      // 탈퇴 여부 확인
      const {data:{user:u}}=await api.getUser();
      if(u){
        const {data:prof}=await api.getProfileFields(u.id,'deleted');
        if(prof?.deleted){
          await api.signOut();
          setErr('탈퇴된 계정이에요. 새 아이디로 가입해주세요.');
          setLoading(false);return;
        }
      }
    } else {
      const {data,error}=await api.signUp(email,pw);
      if(error){
        const msg=translateAuthError(error);
        if(msg==='ALREADY_REGISTERED'){
          setErr('이미 가입된 계정이에요. 로그인을 시도해보세요.');
          setMode('login');
        } else {
          setErr(msg);
        }
        setLoading(false);return;
      }
      const uid=data?.user?.id;
      if(uid){
        // profile 저장
        const {error:profErr}=await api.upsertProfile({
          id:uid,
          name:name.trim(),
          school:org.trim(),
          department:dept.trim(),
          username:userId.trim().toLowerCase(),
          role,event_size:size,event_frequency:freq,
          current_method:Array.isArray(method)?method.join(','):method,
          referral,phone:phone.trim(),
          marketing_agree:marketing,
          updated_at:new Date().toISOString(),
        });
        if(profErr){console.error('Profile save error:',profErr);}
        // profile 저장 후 data reload (race condition 방지)
        await nav.loadUserData(uid);
        // 신규가입 온보딩 표시
        setShowOnboarding(true);
      }
    }
    setLoading(false);
  };

  return(
    <div className="fade-up screen" style={{background:C.pageBg}}>
      <Header title={mode==='login'?'로그인':'회원가입'} onBack={()=>nav.setView('home')}/>
      <div style={{padding:'16px 16px calc(40px + env(safe-area-inset-bottom))'}}>

        {mode==='signup'&&(
          <div style={{background:C.accentBg,borderRadius:16,padding:'14px 16px',marginBottom:14,border:`1px solid ${C.accent}20`}}>
            <div style={{fontWeight:800,color:C.text,fontSize:14,marginBottom:2}}>🍻 정산해에 오신 걸 환영해요!</div>
            <div style={{fontSize:12,color:C.textMid}}>아래 정보는 서비스 개선에만 활용돼요.</div>
          </div>
        )}

        <Card>
          <div style={{fontSize:12,color:C.textMid,fontWeight:700,marginBottom:7}}>아이디</div>
          <div style={{marginBottom:14}}>
            <input value={userId} onChange={e=>{setUserId(e.target.value.replace(/[^a-zA-Z0-9_]/g,''));setIdChecked(false);setIdAvail(null);setErr('');}}
              onBlur={()=>mode==='signup'&&userId.trim().length>=3&&checkId()}
              placeholder="영문, 숫자, _ (3~20자)" maxLength={20}
              style={{width:'100%',padding:'12px 14px',background:C.inputBg,border:`1.5px solid ${idChecked?(idAvail?C.green:C.red):C.border}`,borderRadius:12,color:C.text,fontSize:15,outline:'none',transition:'border 0.15s'}}
              onFocus={e=>!idChecked&&(e.target.style.border=`1.5px solid ${C.accent}`)}
            />
          </div>
          {idChecking&&<div style={{color:C.accent,fontSize:12,marginTop:-10,marginBottom:10}}>확인 중...</div>}
          {!idChecking&&idChecked&&idAvail&&<div style={{color:C.green,fontSize:12,marginTop:-10,marginBottom:10}}>✓ 사용 가능한 아이디예요</div>}
          {!idChecking&&idChecked&&!idAvail&&err==='이미 사용 중인 아이디예요'&&<div style={{color:C.red,fontSize:12,marginTop:-10,marginBottom:10}}>✗ 사용 불가능한 아이디예요</div>}
          <Field label="비밀번호" value={pw} onChange={setPw} placeholder="6자 이상" type="password" onEnter={mode==='login'?submit:undefined}/>
          {mode==='signup'&&(
            <div style={{position:'relative'}}>
              <Field label="비밀번호 확인" value={pw2} onChange={setPw2} placeholder="동일하게 입력" type="password"/>
              {pw2.length>0&&<div style={{position:'absolute',right:14,top:36,fontSize:16,color:pw===pw2?C.green:C.red}}>{pw===pw2?'✓':'✗'}</div>}
            </div>
          )}
        </Card>

        {mode==='signup'&&(
          <>
            <Card>
              <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:14}}>기본 정보</div>
              <Field label="이름 (실명) *" value={name} onChange={setName} placeholder="홍길동"/>
              <div style={{display:'flex',gap:10}}>
                <div style={{flex:1}}><Field label="학교·단체 *" value={org} onChange={setOrg} placeholder="OO대학교 / OO동아리"/></div>
                <div style={{flex:1}}><Field label="학과·팀명 *" value={dept} onChange={setDept} placeholder="컴퓨터공학과 / 기획팀"/></div>
              </div>
              <Field label="전화번호 *" value={phone} onChange={v=>setPhone(v.replace(/[^0-9]/g,''))} placeholder="01012345678" inputMode="numeric"/>
            </Card>
            <Card>
              <div style={{fontWeight:700,color:C.textMid,fontSize:13,marginBottom:14}}>사용 패턴 (선택)</div>
              <div style={{fontSize:12,color:C.textMid,fontWeight:700,marginBottom:8}}>주로 몇 명 규모?</div>
              <SelectGrid options={['10명 미만','10~30명','30~50명','50명 이상']} value={size} onChange={setSize}/>
              <div style={{fontSize:12,color:C.textMid,fontWeight:700,margin:'14px 0 8px'}}>연간 행사 횟수</div>
              <SelectGrid options={['1~2회','3~5회','6~10회','10회 이상']} value={freq} onChange={setFreq}/>
              <div style={{fontSize:12,color:C.textMid,fontWeight:700,margin:'14px 0 8px'}}>기존 정산 방법 <span style={{fontWeight:400,color:C.textDim}}>(복수 선택)</span></div>
              <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:4}}>
                {['카톡으로 직접','손으로','엑셀/구글시트','다른 앱','따로 안 함'].map(o=>{
                  const sel=method.includes(o);
                  return <button key={o} onClick={()=>setMethod(m=>sel?m.filter(x=>x!==o):[...m,o])} className="press" style={{padding:'8px 13px',borderRadius:20,border:`2px solid ${sel?C.accent:C.border}`,background:sel?C.accentBg:C.cardBg,color:sel?C.accent:C.textMid,fontSize:12,fontWeight:600,cursor:'pointer'}}>{o}</button>;
                })}
              </div>
            </Card>
            <Card>
              <div style={{fontWeight:800,color:C.text,fontSize:14,marginBottom:14}}>약관 동의</div>
              {/* 전체 동의 */}
              <div onClick={()=>{const allChecked=termsAgree&&privacyAgree&&thirdPartyAgree&&marketing;setTermsAgree(!allChecked);setPrivacyAgree(!allChecked);setThirdPartyAgree(!allChecked);setMarketing(!allChecked);}} style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer',padding:'14px 16px',background:C.inputBg,borderRadius:14,marginBottom:14,border:`1.5px solid ${termsAgree&&privacyAgree&&thirdPartyAgree?C.accent:C.border}`}}>
                <div style={{width:24,height:24,borderRadius:8,border:`2px solid ${termsAgree&&privacyAgree&&thirdPartyAgree&&marketing?C.accent:C.border}`,background:termsAgree&&privacyAgree&&thirdPartyAgree&&marketing?C.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                  {termsAgree&&privacyAgree&&thirdPartyAgree&&marketing&&<span style={{color:'#fff',fontSize:14,fontWeight:900}}>✓</span>}
                </div>
                <div style={{fontWeight:800,color:C.text,fontSize:14}}>전체 동의</div>
              </div>
              {[
                {key:'terms',state:termsAgree,set:setTermsAgree,label:'서비스 이용약관',required:true,desc:'서비스 이용에 관한 기본 규칙'},
                {key:'privacy',state:privacyAgree,set:setPrivacyAgree,label:'개인정보 수집 및 이용 동의',required:true,desc:'이름, 소속, 연락처 수집 및 이용'},
                {key:'thirdParty',state:thirdPartyAgree,set:setThirdPartyAgree,label:'제3자 정보 제공 동의',required:true,desc:'서비스 운영에 필요한 외부 서비스 제공'},
                {key:'marketing',state:marketing,set:setMarketing,label:'마케팅 수신 동의',required:false,desc:'유용한 소식 및 업데이트 안내'},
              ].map(item=>(
                <div key={item.key} style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:12}}>
                  <div onClick={()=>item.set(v=>!v)} style={{width:22,height:22,borderRadius:7,border:`2px solid ${item.state?C.accent:item.required?C.red+'80':C.border}`,background:item.state?C.accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,cursor:'pointer'}}>
                    {item.state&&<span style={{color:'#fff',fontSize:13,fontWeight:900}}>✓</span>}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <span onClick={()=>item.set(v=>!v)} style={{fontSize:13,fontWeight:700,color:C.text,cursor:'pointer'}}>[{item.required?'필수':'선택'}] {item.label}</span>
                      <button onClick={()=>setLegalModal(item.key)} style={{background:'none',border:'none',color:C.textDim,fontSize:11,cursor:'pointer',textDecoration:'underline',padding:0}}>보기</button>
                    </div>
                    <div style={{fontSize:11,color:C.textDim,marginTop:2}}>{item.desc}</div>
                  </div>
                </div>
              ))}
            </Card>
            <Modal isOpen={!!legalModal} onClose={()=>setLegalModal(null)}
              title={legalModal==='terms'?'서비스 이용약관':legalModal==='privacy'?'개인정보 처리방침':legalModal==='thirdParty'?'제3자 정보 제공 동의':'마케팅 수신 동의'}>
              <div style={{fontSize:13,color:C.textMid,lineHeight:2}}>
                {legalModal&&LEGAL_TEXTS[legalModal]}
              </div>
            </Modal>
          </>
        )}

        {err&&<div style={{color:C.red,fontSize:13,marginBottom:12,padding:'11px 14px',background:C.redBg,borderRadius:10}}>⚠ {err}</div>}
        <Btn onClick={submit} loading={loading}>{mode==='login'?'로그인':'가입하고 시작하기 →'}</Btn>

        <div style={{textAlign:'center',marginTop:18}}>
          <span style={{color:C.textDim,fontSize:14}}>{mode==='login'?'계정이 없으신가요?':'이미 계정이 있으신가요?'} </span>
          <button onClick={()=>{setMode(m=>m==='login'?'signup':'login');setErr('');}} style={{color:C.accent,fontWeight:700,fontSize:14,background:'none',border:'none',cursor:'pointer'}}>
            {mode==='login'?'회원가입':'로그인'}
          </button>
        </div>

    try { const v=localStorage.getItem('jungsan_sort_latest'); return v===null?true:v==='1'; } catch { return true; }
  });
  const toggleSortLatest=()=>setSortLatest(v=>{const n=!v;try{localStorage.setItem('jungsan_sort_latest',n?'1':'0');}catch{}return n;});

// ── SetupScreen ────────────────────────────────────────────
function SetupScreen({nav,profile,saveProfile}){
  const [bank,setBank]=useState(profile.account?.bank||'');
  const [number,setNumber]=useState(profile.account?.number||'');
  const [holder,setHolder]=useState(profile.account?.holder||'');
  const _rawGroups=profile.groups?.length
    ?profile.groups.map(g=>g.name==='전체'?{...g,name:'기본'}:g)
    :[{id:'g1',name:'기본',rawText:'',members:[]}];
  const [groups,setGroups]=useState(_rawGroups);
  const [activeG,setActiveG]=useState(-1);
  const [saving,setSaving]=useState(false);
  const [saved,setSaved]=useState(false);
  const [addingGroup,setAddingGroup]=useState(false);
  const [newGName,setNewGName]=useState('');
  const [pfmOpen,setPfmOpen]=useState(false);

  const updateRaw=(idx,text)=>{
    const members=parseMembers(text);
    const validKeys=new Set(members.map(m=>m.name+(m.sid?'_'+m.sid:'')));
    setGroups(gs=>gs.map((g,i)=>i===idx?{...g,rawText:text,members,paidFeeMembers:(g.paidFeeMembers||[]).filter(k=>validKeys.has(k))}:g));
  };
  const updatePaidFeeMembers=(idx,keys)=>{
    setGroups(gs=>gs.map((g,i)=>i===idx?{...g,paidFeeMembers:keys}:g));
  };
  const togglePaidFee=(idx,key)=>{
    const realIdx=idx===-1?groups.findIndex(g=>g.members.some(m=>m.name+(m.sid?'_'+m.sid:'')=== key)):idx;
    if(realIdx===-1) return;
    setGroups(gs=>gs.map((g,i)=>i===realIdx?{...g,paidFeeMembers:(g.paidFeeMembers||[]).includes(key)?(g.paidFeeMembers||[]).filter(k=>k!==key):[...(g.paidFeeMembers||[]),key]}:g));
  };
  const textareaRef=useRef(null);
  const addGroup=()=>{
    if(!newGName.trim()) return;
    setGroups(gs=>[...gs,{id:'g'+Date.now(),name:newGName.trim(),rawText:'',members:[]}]);
    setActiveG(groups.length);setAddingGroup(false);setNewGName('');
    setTimeout(()=>textareaRef.current?.focus(),100);
  };
  const delGroup=idx=>{
    if(groups.length<=1) return;
    setGroups(gs=>gs.filter((_,i)=>i!==idx));
    setActiveG(Math.max(0,idx-1));
  };
  const save=async()=>{
    setSaving(true);
    await saveProfile({...profile,account:{bank,number,holder},groups});
    setSaving(false);setSaved(true);setTimeout(()=>setSaved(false),2200);
  };
  const cur=activeG===-1?null:(groups[activeG]||groups[0]);
  const displayMembers=activeG===-1?groups.flatMap(g=>g.members||[]):(cur?.members||[]);

  return(
    <div className="fade-up screen" style={{background:C.pageBg}}>
      <Header title="명단·계좌 설정" onBack={()=>nav.setView('home')}/>
      <div style={{padding:'16px 16px 24px'}}>
        <Card>
          <div style={{fontWeight:800,color:C.text,marginBottom:4,fontSize:15}}>💳 입금 계좌</div>

function DeleteAccountBtn(){
  const [confirm,setConfirm]=useState(false);
  const [loading,setLoading]=useState(false);
  
  const deleteAccount=async()=>{
    setLoading(true);
    const {data:{user}}=await api.getUser();
    if(user){
      // events 삭제
      await api.deleteEventsByUser(user.id);
      // profile에 탈퇴 마킹 (삭제 대신 - auth user 삭제 불가)
      await api.upsertProfile({id:user.id,deleted:true,updated_at:new Date().toISOString()});
      await api.signOut();
    }
    setLoading(false);
  };

  if(!confirm) return(
    <button onClick={()=>setConfirm(true)} style={{color:C.textDim,background:'none',border:'none',fontSize:13,cursor:'pointer',textDecoration:'underline',width:'100%',textAlign:'center'}}>
      회원 탈퇴
    </button>
  );

  return(
    <Card style={{border:`2px solid ${C.red}30`,background:C.redBg}}>
      <div style={{fontWeight:800,color:C.red,marginBottom:6}}>정말 탈퇴하시겠어요?</div>
      <div style={{fontSize:13,color:C.textMid,marginBottom:14,lineHeight:1.7}}>모든 정산 데이터와 명단이 삭제돼요.<br/>이 작업은 되돌릴 수 없어요.</div>
      <div style={{display:'flex',gap:8}}>
        <Btn variant="ghost" onClick={()=>setConfirm(false)} style={{flex:1}}>취소</Btn>
        <Btn variant="danger" onClick={deleteAccount} loading={loading} style={{flex:1}}>탈퇴하기</Btn>
      </div>
    </Card>
  );
}

// ── CreateScreen ───────────────────────────────────────────
function CreateScreen({nav,profile,events,createEvent,showToast}){
  const [name,setName]=useState('');
  const [date,setDate]=useState(new Date().toISOString().slice(0,10));

  const [bank,setBank]=useState(profile.account?.bank||'');
  const [number,setNumber]=useState(profile.account?.number||'');
  const [holder,setHolder]=useState(profile.account?.holder||'');
  const [selected,setSelected]=useState([]);
  const [extraText,setExtraText]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const [activeG,setActiveG]=useState(-1);
  const groups=profile.groups||[];
  const allFromGroups=groups.flatMap(g=>g.members||[]);
  const extraMembers=parseMembers(extraText).filter(m=>!allFromGroups.find(x=>x.name===m.name&&x.sid===m.sid));
  // 관리자 본인 자동 포함
  const adminName=profile.name||'';
  const adminMember=adminName&&!allFromGroups.find(m=>m.name===adminName)?[{name:adminName,sid:''}]:[];
  const allMembers=[...adminMember,...allFromGroups,...extraMembers];
  const memberMap={};
  allMembers.forEach(m=>{memberMap[m.name+(m.sid?`_${m.sid}`:'')] = displayName(m);});
  const visibleMembers=activeG===-1?allMembers:(groups[activeG]?.members||[]);

  const toggle=m=>{
    const k=m.name+(m.sid?`_${m.sid}`:'');
    setSelected(s=>s.includes(k)?s.filter(x=>x!==k):[...s,k]);
  };
  const selectGroup=gIdx=>{
    const gm=gIdx===-1?allMembers:(groups[gIdx]?.members||[]);
    const keys=gm.map(m=>m.name+(m.sid?`_${m.sid}`:''));
    const allSel=keys.every(k=>selected.includes(k));
    setSelected(s=>allSel?s.filter(k=>!keys.includes(k)):[...new Set([...s,...keys])]);
  };

  const create=async()=>{
    setErr('');
    if(!name.trim()){setErr('정산 이름을 입력해주세요');return;}

    if(selected.length===0){setErr('참여자를 1명 이상 선택해주세요');return;}
    setLoading(true);
    const code=genCode();
    const paidFeeKeys=selected.filter(k=>groups.some(g=>(g.paidFeeMembers||[]).includes(k)));
    const ev={code,name:name.trim(),date,pin:'',account:{bank,number,holder},members:selected,memberMap,rounds:[],payments:{},attendance:{},attendanceOpen:false,createdAt:new Date().toISOString(),paidFeeKeys,feeConfig:null,sourceFormCode:null};
    const ok=await createEvent(ev);
    setLoading(false);
    if(ok){nav.setCurrentCode(ev.code);nav.setView('adminEvent');}
  };

  const hasAccount=profile.account?.bank&&profile.account?.number;

  return(
    <div className="fade-up screen" style={{background:C.pageBg}}>
      <Header title="새 정산 만들기" onBack={()=>nav.setView('home')}/>
      <div style={{padding:'16px 16px 24px'}}>
        <Card>
          <Field label="정산 이름" value={name} onChange={setName} placeholder="5월 MT, 종강 회식…"/>
          <Field label="날짜" value={date} onChange={setDate} type="date"/>

        </Card>
        <Card>
          <div style={{fontWeight:800,color:C.text,marginBottom:12,fontSize:14}}>💳 입금 계좌</div>
          {hasAccount?(
            <div style={{fontSize:13,color:C.textMid,padding:'11px 14px',background:C.inputBg,borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center',border:`1.5px solid ${C.border}`}}>
              <span>{bank} {number} ({holder})</span>
              <Badge color={C.green}>자동 적용</Badge>
            </div>
          ):(
            <>
              <Field label="은행" value={bank} onChange={setBank} placeholder="카카오뱅크"/>
              <Field label="계좌번호" value={number} onChange={setNumber} placeholder="계좌번호" inputMode="numeric"/>
              <Field label="예금주" value={holder} onChange={setHolder} placeholder="이름"/>
            </>
          )}
        </Card>
        <Card>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <div style={{fontWeight:800,color:C.text,fontSize:14}}>👥 참여자 선택 <span style={{color:C.accent}}>({selected.length}명)</span></div>
          </div>
          {groups.length>0&&(
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:12}}>
              <button onClick={()=>{
                const allKeys=allMembers.map(m=>m.name+(m.sid?`_${m.sid}`:''));
                const allSelected=allKeys.length>0&&allKeys.every(k=>selected.includes(k));
                setSelected(allSelected?[]:allKeys);
                setActiveG(-1);
              }} className="press" style={{padding:'6px 13px',borderRadius:16,border:`1.5px solid ${selected.length===allMembers.length&&allMembers.length>0?C.accent:C.border}`,background:selected.length===allMembers.length&&allMembers.length>0?C.accent:C.cardBg,color:selected.length===allMembers.length&&allMembers.length>0?'#fff':C.textMid,fontSize:12,fontWeight:700,cursor:'pointer'}}>
                전체 {selected.length===allMembers.length&&allMembers.length>0?'✓':''}
              </button>
              {groups.map((g,i)=>({g,i})).filter(({g})=>(g.members||[]).length>0).map(({g,i})=>{
                const keys=(g.members||[]).map(m=>m.name+(m.sid?`_${m.sid}`:''));
                const allSel=keys.length>0&&keys.every(k=>selected.includes(k));
                return(
                  <button key={g.id} onClick={()=>{setActiveG(i);selectGroup(i);}} className="press" style={{padding:'6px 13px',borderRadius:16,border:`1.5px solid ${allSel?C.accent:C.border}`,background:allSel?C.accentBg:C.cardBg,color:allSel?C.accent:C.textMid,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all 0.12s'}}>
                    {g.name} {allSel?'✓':''}
                  </button>
                );
              })}
            </div>
          )}
          <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:allMembers.length>0?14:0}}>
            {visibleMembers.map(m=>{
              const k=m.name+(m.sid?`_${m.sid}`:'');
              const sel=selected.includes(k);
              return(
                <button key={k} onClick={()=>toggle(m)} className="press" style={{padding:'8px 14px',borderRadius:20,border:`2px solid ${sel?C.accent:C.border}`,cursor:'pointer',fontSize:13,fontWeight:600,background:sel?C.accentBg:C.cardBg,color:sel?C.accent:C.textMid,transition:'all 0.12s'}}>
                  {displayName(m)}
                </button>
              );
            })}
          </div>
          {allMembers.length===0&&(
            <div style={{background:C.accentBg,borderRadius:14,padding:'14px 16px',marginBottom:10,border:`1px solid ${C.accent}20`}}>
              <div style={{fontWeight:700,color:C.text,fontSize:14,marginBottom:4}}>등록된 명단이 없네요</div>
              <div style={{fontSize:13,color:C.textMid,lineHeight:1.7,marginBottom:10}}>명단을 먼저 등록하면 매번 이름 없이 바로 선택할 수 있어요.</div>
              <button onClick={()=>nav.setView('setup')} style={{background:C.accent,color:'#fff',border:'none',borderRadius:10,padding:'8px 16px',fontSize:13,fontWeight:700,cursor:'pointer'}}>명단 등록하러 가기 →</button>
            </div>
          )}
          <div style={{marginTop:6}}>
            <div style={{fontSize:12,color:C.textDim,fontWeight:600,marginBottom:6}}>추가 참여자</div>
            <Field value={extraText} onChange={setExtraText} placeholder="홍길동&#10;김철수" multiline rows={2}/>
          </div>
        </Card>
        {err&&<div style={{color:C.red,fontSize:13,marginBottom:12,padding:'11px 14px',background:C.redBg,borderRadius:10}}>⚠ {err}</div>}
        <Btn onClick={create} loading={loading}>정산 생성하기 →</Btn>
      </div>
    </div>
  );
}

// ── AdminEventScreen (플로우 구조) ───────────────────────
function AdminEventScreen({nav,event:initEvent,updateEvent,showToast,profile}){
  const [event,setEvent]=useState(initEvent);
  const [viewCount,setViewCount]=useState(0);
  const getInitSlide=ev=>{
    const hasRoundsWithAmount=(ev.rounds||[]).some(r=>r.amount>0);
    if(hasRoundsWithAmount) return 3;
    const attDone=ev.members.some(k=>ev.attendance[k]===true)||ev.members.some(k=>ev.attendance[k]===false);
    if(attDone) return 1;
    return 0;
  };
  const [slide,setSlide]=useState(()=>getInitSlide(initEvent));

  useEffect(()=>setEvent(initEvent),[initEvent]);
  useRealtimeEvent(event.code,ev=>setEvent(ev));
  useEffect(()=>{api.getViewCount(event.code,null).then(c=>setViewCount(c));},[event.code]);

  const update=async ev=>{setEvent(ev);if(updateEvent) await updateEvent(ev);};

  const presentMembers=event.members.filter(k=>event.attendance[k]!==false);
  const pc=presentMembers.filter(k=>event.payments?.[k]?.paid).length;
  const done=pc===presentMembers.length&&presentMembers.length>0;
  const attDone=event.members.some(k=>event.attendance[k]===true)||event.members.some(k=>event.attendance[k]===false);
  const hasRounds=event.rounds.length>0;

  const steps=['출석 체크','금액 입력','공유하기','정산현황'];
  const stepDone=[attDone,hasRounds,done,false];

  const archiveEvent=async()=>{
    if(!window.confirm('정산을 종료하고 내역으로 이동할까요?')) return;
    const payments={...event.payments};
    event.members.forEach(k=>{if(!payments[k]?.paid) payments[k]={paid:true,time:new Date().toISOString(),by:'archive'};});
    await update({...event,payments});
    nav.setView('home');
  };

  return(
    <div className="screen" style={{background:C.pageBg,display:'flex',flexDirection:'column'}}>
      {/* 헤더 */}
      <div style={{display:'flex',alignItems:'center',padding:'16px 20px',background:C.cardBg,position:'sticky',top:0,zIndex:10,gap:12}}>
        <button onClick={()=>nav.setView('home')} style={{background:'transparent',border:'none',color:C.text,cursor:'pointer',width:40,height:40,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,padding:0,margin:'-8px'}}><span className="ms" style={{fontSize:24}}>arrow_back</span></button>
        <div style={{flex:1}}>
          <div style={{fontSize:18,fontWeight:800,color:C.text,letterSpacing:-0.5}}>{event.name}</div>
          <div style={{fontSize:12,color:C.textDim,marginTop:2,display:'flex',alignItems:'center',gap:8}}>
            {steps[slide]}
            {viewCount>0&&<span style={{color:C.accent}}>👀 {viewCount}</span>}
          </div>
        </div>
        <button onClick={archiveEvent} style={{background:C.inputBg,border:'none',borderRadius:12,color:C.textMid,cursor:'pointer',padding:'8px 14px',fontSize:13,fontWeight:700}}>종료</button>
      </div>

      <FlowStepper steps={steps} current={slide} done={stepDone} onStepClick={setSlide}/>

      {/* 슬라이드 콘텐츠 */}
      <div style={{flex:1,overflow:'auto'}}>
        <div style={{padding:'16px 18px'}}>
          {slide===0&&(
            <div className="fade-up">
              <AttendanceSection event={event} updateEvent={update} onDone={()=>setSlide(1)} groups={profile?.groups}/>
            </div>
          )}
          {slide===1&&(
            <div className="fade-up">
              <RoundsSection event={event} updateEvent={update} onRoundAdded={()=>setSlide(2)} groups={profile?.groups}/>
            </div>
          )}
          {slide===2&&(
            <div className="fade-up">
              <ShareSection event={event} showToast={showToast}/>
            </div>
          )}
          {slide===3&&(
            <div className="fade-up">
              <StatusSection event={event} updateEvent={update} groups={profile?.groups} showToast={showToast}/>
            </div>
          )}
        </div>
      </div>

      {/* 하단 네비게이션 */}
      <div style={{padding:'12px 20px 24px',background:C.cardBg,borderTop:`1px solid ${C.pageBg}`,display:'flex',gap:10}}>
        {slide>0&&<Btn variant="secondary" onClick={()=>setSlide(s=>s-1)} style={{flex:1}}>이전</Btn>}
        {slide<steps.length-1&&(
          <Btn onClick={()=>setSlide(s=>s+1)} style={{flex:2}}>다음</Btn>
        )}
        {slide===steps.length-1&&<Btn variant="green" onClick={()=>nav.setView('home')} style={{flex:2}}>홈으로</Btn>}
      </div>
    </div>
  );
}


// ── AttendanceSection ──────────────────────────────────────
function AttendanceSection({event,updateEvent,onDone,groups}){
  const [search,setSearch]=useState('');
  const mm=event.memberMap||{};

  const toggleAtt=(k)=>{
    const isAbsent=event.attendance[k]===false;
    updateEvent({...event,attendance:{...event.attendance,[k]:isAbsent?true:false}});
  };
  const allPresent=event.members.every(k=>event.attendance[k]!==false);
  const filtered=event.members.filter(k=>!search||(mm[k]||k).includes(search));

  // groups가 2개 이상일 때만 그룹 묶음 표시
  const useGroupView=(groups||[]).length>1&&!search;
  const groupSections=React.useMemo(()=>{
    if(!useGroupView) return null;
    const assigned=new Set();
    const sections=(groups||[]).map(g=>{
      const gKeys=new Set((g.members||[]).map(m=>m.name+(m.sid?`_${m.sid}`:'')));
      const keys=event.members.filter(k=>gKeys.has(k));
      keys.forEach(k=>assigned.add(k));
      return {name:g.name,keys};
    }).filter(s=>s.keys.length>0);
    const unassigned=event.members.filter(k=>!assigned.has(k));
    if(unassigned.length>0) sections.push({name:'미분류',keys:unassigned});
    return sections;
  },[useGroupView,groups,event.members]);

  const MemberRow=({k})=>{
    const att=event.attendance[k];
    const isAbsent=att===false;
    return(
      <div key={k} onClick={()=>toggleAtt(k)} className="press" style={{
        background:isAbsent?C.inputBg:C.cardBg,borderRadius:12,padding:'10px 14px',marginBottom:6,
        display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer',
        border:`1.5px solid ${isAbsent?C.red+'40':C.green+'40'}`,
        opacity:isAbsent?0.6:1,transition:'all 0.15s',
      }}>
        <div style={{fontWeight:600,color:isAbsent?C.textDim:C.text,fontSize:14,textDecoration:isAbsent?'line-through':'none'}}>{mm[k]||k}</div>
        <div style={{
          width:28,height:28,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',
          background:isAbsent?C.redBg:C.green,
          color:isAbsent?C.red:'#fff',fontWeight:900,fontSize:14,transition:'all 0.15s',
        }}>{isAbsent?'✕':'○'}</div>
      </div>
    );
  };

  return(
    <div>
      {/* 전원 참석 버튼 */}
      <button onClick={()=>{
        const a={};
        event.members.forEach(k=>a[k]=true);
        updateEvent({...event,attendance:a});
      }} style={{
        width:'100%',marginBottom:8,padding:'11px',borderRadius:12,
        border:`2px solid ${allPresent?C.green:C.border}`,
        background:allPresent?C.green:C.cardBg,
        color:allPresent?'#fff':C.textMid,
        fontWeight:700,fontSize:14,cursor:'pointer',transition:'all 0.2s',
      }}>
        {allPresent?'✓ 전원 참석':'전원 참석'}
      </button>

      <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="이름 검색..."
        style={{width:'100%',padding:'10px 14px',background:C.inputBg,border:`1.5px solid ${C.border}`,borderRadius:12,fontSize:13,outline:'none',marginBottom:10}}
      />

      <div style={{maxHeight:380,overflowY:'auto'}}>
        {useGroupView?(
          groupSections.map(section=>(
            <div key={section.name} style={{marginBottom:8}}>
              <div style={{fontSize:11,fontWeight:700,color:C.textDim,padding:'4px 4px 6px',letterSpacing:0.5}}>
                {section.name} ({section.keys.filter(k=>event.attendance[k]!==false).length}/{section.keys.length})
              </div>
              {section.keys.map(k=><MemberRow key={k} k={k}/>)}
            </div>
          ))
        ):(
          filtered.map(k=><MemberRow key={k} k={k}/>)
        )}
      </div>

      <div style={{marginTop:4,fontSize:11,color:C.textDim,textAlign:'center'}}>탭하면 불참 처리돼요</div>
    </div>
  );
}

// ── FeeConfigSection ───────────────────────────────────────
function FeeConfigSection({event,updateEvent}){
  const fc=event.feeConfig;
  const presentMembers=event.members.filter(k=>event.attendance[k]!==false);
  const totalMembers=presentMembers.length||1;

  const [totalCostInput,setTotalCostInput]=useState(String(fc?.totalCost||''));
  const [subsidyInput,setSubsidyInput]=useState(String(fc?.subsidyPerPaid||''));
  const [paidInput,setPaidInput]=useState(String(fc?.paidFeeAmount||''));
  const [unpaidInput,setUnpaidInput]=useState(String(fc?.unpaidFeeAmount||''));

  useEffect(()=>{
    if(fc){
      setTotalCostInput(String(fc.totalCost||''));
      setSubsidyInput(String(fc.subsidyPerPaid||''));
      setPaidInput(String(fc.paidFeeAmount||''));
      setUnpaidInput(String(fc.unpaidFeeAmount||''));
    }
  },[event.code]);

  const previewAuto=()=>{
    const total=Number(totalCostInput)||0;
    const sub=Number(subsidyInput)||0;
    const unpaid=total?Math.ceil(total/totalMembers):0;
    return {unpaid,paid:Math.max(0,unpaid-sub)};
  };

  const saveFeeConfig=(mode)=>{
    if(mode==='auto'){
      const {unpaid,paid}=previewAuto();
      const newFc={mode:'auto',totalCost:Number(totalCostInput)||0,subsidyPerPaid:Number(subsidyInput)||0,paidFeeAmount:paid,unpaidFeeAmount:unpaid};
      const rounds=event.rounds.map(r=>r.id==='round_1'?{...r,amount:Number(totalCostInput)||0}:r);
      updateEvent({...event,feeConfig:newFc,rounds});
    } else {
      const newFc={mode:'manual',totalCost:null,subsidyPerPaid:null,paidFeeAmount:Number(paidInput)||0,unpaidFeeAmount:Number(unpaidInput)||0};
      updateEvent({...event,feeConfig:newFc});
    }
  };

  const switchMode=(newMode)=>{
    if(fc?.mode===newMode) return;
    if(newMode==='auto'&&fc?.mode==='manual'){
      if(!window.confirm('자동 계산 값으로 변경됩니다. 직접 입력한 금액은 초기화됩니다.')) return;
    }
    if(newMode==='manual'&&fc?.mode==='auto'){
      const {unpaid,paid}=previewAuto();
      setPaidInput(String(paid));
      setUnpaidInput(String(unpaid));
    }
    saveFeeConfig(newMode);
  };

  const activate=()=>updateEvent({...event,feeConfig:{mode:'auto',totalCost:0,subsidyPerPaid:0,paidFeeAmount:0,unpaidFeeAmount:0}});
  const deactivate=()=>{
    if(!window.confirm('정산 방식 설정을 해제할까요? 기본 1/n 계산으로 돌아갑니다.')) return;
    updateEvent({...event,feeConfig:null});
  };

  const {unpaid:pvUnpaid,paid:pvPaid}=previewAuto();

  return(
    <div style={{background:C.cardBg,borderRadius:14,padding:'14px',marginBottom:12,border:`1.5px solid ${C.accent}30`,boxShadow:C.shadow}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:fc?12:6}}>
        <div style={{fontWeight:800,fontSize:14,color:C.text}}>정산 방식</div>
        {fc?(
          <button onClick={deactivate} style={{fontSize:11,color:C.textMid,background:'none',border:'none',cursor:'pointer',padding:'2px 4px'}}>해제</button>
        ):(
          <button onClick={activate} style={{fontSize:12,color:C.accent,fontWeight:700,background:C.accentBg,border:'none',borderRadius:8,padding:'5px 12px',cursor:'pointer'}}>설정하기</button>
        )}
      </div>
      {!fc&&<div style={{fontSize:12,color:C.textDim,lineHeight:1.5}}>학생회비 납부 여부에 따라 금액을 다르게 설정할 수 있어요</div>}
      {fc&&(
        <>
          <div style={{display:'flex',gap:6,marginBottom:14}}>
            {[['auto','자동 계산'],['manual','직접 입력']].map(([m,label])=>(
              <button key={m} onClick={()=>switchMode(m)} style={{flex:1,padding:'9px',borderRadius:10,fontSize:13,fontWeight:700,cursor:'pointer',border:'none',background:fc.mode===m?C.accent:C.inputBg,color:fc.mode===m?'#fff':C.textMid}}>{label}</button>
            ))}
          </div>
          {fc.mode==='auto'&&(
            <div className="fade-up">
              <Field label="총 행사비 (원)" value={totalCostInput} onChange={v=>setTotalCostInput(v.replace(/[^0-9]/g,''))} inputMode="numeric" placeholder="300000"/>
              <Field label="학생회비 지원 단가 (납부자당)" value={subsidyInput} onChange={v=>setSubsidyInput(v.replace(/[^0-9]/g,''))} inputMode="numeric" placeholder="5000"/>
              <div style={{background:C.accentBg,borderRadius:10,padding:'10px 14px',marginBottom:12}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                  <span style={{fontSize:13,color:C.textMid}}>학생회비 납부자</span>
                  <span style={{fontSize:15,fontWeight:900,color:C.accent}}>{fmtKRW(pvPaid)}</span>
                </div>
                <div style={{display:'flex',justifyContent:'space-between'}}>
                  <span style={{fontSize:13,color:C.textMid}}>학생회비 미납자</span>
                  <span style={{fontSize:15,fontWeight:900,color:C.red}}>{fmtKRW(pvUnpaid)}</span>
                </div>
              </div>
              <Btn onClick={()=>saveFeeConfig('auto')} small>적용</Btn>
            </div>
          )}
          {fc.mode==='manual'&&(
            <div className="fade-up">
              <Field label="납부자 공지 금액 (원)" value={paidInput} onChange={v=>setPaidInput(v.replace(/[^0-9]/g,''))} inputMode="numeric" placeholder="8000"/>
              <Field label="미납자 공지 금액 (원)" value={unpaidInput} onChange={v=>setUnpaidInput(v.replace(/[^0-9]/g,''))} inputMode="numeric" placeholder="13000"/>
              <Btn onClick={()=>saveFeeConfig('manual')} small>적용</Btn>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ── RoundsSection ──────────────────────────────────────────
function RoundsSection({event,updateEvent,onRoundAdded,groups}){
  const [editingId,setEditingId]=useState('round_1'); // 1차 기본으로 열려있음
  const [adding,setAdding]=useState(false);
  const [label,setLabel]=useState('');
  const [amount,setAmount]=useState('');
  const [roundMembers,setRoundMembers]=useState([]);
  const [roundExtraMembers,setRoundExtraMembers]=useState([]);
  const [roundExtraInput,setRoundExtraInput]=useState('');
  const [editAmount,setEditAmount]=useState('');
  const [extraInput,setExtraInput]=useState('');
  const mm=event.memberMap||{};
  const presentMembers=event.members.filter(k=>event.attendance[k]!==false);

  const useGroupChips=(groups||[]).length>1;
  const chipGroupSections=React.useMemo(()=>{
    if(!useGroupChips) return null;
    const pMembers=event.members.filter(k=>event.attendance[k]!==false);
    const assigned=new Set();
    const sections=(groups||[]).map(g=>{
      const gKeys=new Set((g.members||[]).map(m=>m.name+(m.sid?`_${m.sid}`:'')));
      const keys=pMembers.filter(k=>gKeys.has(k));
      keys.forEach(k=>assigned.add(k));
      return {name:g.name,keys};
    }).filter(s=>s.keys.length>0);
    const unassigned=pMembers.filter(k=>!assigned.has(k));
    if(unassigned.length>0) sections.push({name:'미분류',keys:unassigned});
    return sections;
  },[useGroupChips,groups,event.members,event.attendance]);

  // 1차가 없으면 자동 생성 (출석자 기반, 금액만 입력)
  const hasFirst=event.rounds.some(r=>r.label==='1차');
  useEffect(()=>{
    if(!hasFirst&&presentMembers.length>0&&!adding){
      // 1차 자동 생성 (금액 0으로)
      updateEvent({...event,rounds:[{id:'round_1',label:'1차',amount:0,members:[...presentMembers]}]});
    }
  },[]);

  useEffect(()=>{if(adding){setRoundMembers([...presentMembers]);setRoundExtraMembers([]);setRoundExtraInput('');}},[adding]);

  const updateRound=(id,patch)=>updateEvent({...event,rounds:event.rounds.map(r=>r.id===id?{...r,...patch}:r)});

  const addRound=()=>{
    const amt=Number(amount.replace(/[^0-9]/g,''));
    if(!label.trim()||!amt||roundMembers.length===0) return;
    updateEvent({...event,rounds:[...event.rounds,{id:Date.now().toString(),label:label.trim(),amount:amt,members:[...roundMembers],extraMembers:[...roundExtraMembers]}]});
    setAdding(false);setLabel('');setAmount('');setRoundExtraMembers([]);setRoundExtraInput('');
    onRoundAdded&&onRoundAdded();
  };

  const fc=event.feeConfig;

  return(
    <div>
      <FeeConfigSection event={event} updateEvent={updateEvent}/>
      {event.rounds.map((r,idx)=>{
        const isFirst=r.label==='1차';
        const isEditing=editingId===r.id;
        const useFeeConfig=isFirst&&fc?.paidFeeAmount!=null&&(fc.paidFeeAmount||fc.unpaidFeeAmount);
        return(
          <div key={r.id} style={{background:C.cardBg,borderRadius:14,padding:'14px',marginBottom:10,border:`1.5px solid ${(r.amount>0||useFeeConfig)?C.accent+'30':C.orange+'50'}`,boxShadow:C.shadow}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:isEditing?12:0}}>
              <div>
                <div style={{fontWeight:800,color:C.text,fontSize:15}}>{r.label}</div>
                {useFeeConfig&&<div style={{fontSize:12,color:C.textMid,marginTop:2}}>납부자 {fmtKRW(fc.paidFeeAmount)} · 미납자 {fmtKRW(fc.unpaidFeeAmount)}</div>}
                {!useFeeConfig&&r.amount>0&&<div style={{fontSize:12,color:C.textMid,marginTop:2}}>{r.members.length+(r.extraMembers?.length||0)}명 · 1인당 {fmtKRW(Math.ceil(r.amount/(r.members.length+(r.extraMembers?.length||0))))}{(r.extraMembers?.length||0)>0&&<span style={{color:C.orange,marginLeft:5}}>임시 {r.extraMembers.length}명 포함</span>}</div>}
                {!useFeeConfig&&r.amount===0&&<div style={{fontSize:12,color:C.orange,marginTop:2}}>금액을 입력해주세요</div>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {!useFeeConfig&&r.amount>0&&<div style={{color:C.accent,fontWeight:900}}>{fmtKRW(r.amount)}</div>}
                <button onClick={()=>{ setEditingId(isEditing?null:r.id); setEditAmount(r.amount>0?String(r.amount):''); setExtraInput(''); }} style={{background:isEditing?C.accentBg:C.inputBg,border:`1.5px solid ${isEditing?C.accent:C.border}`,borderRadius:8,color:isEditing?C.accent:C.textMid,cursor:'pointer',padding:'5px 10px',fontSize:12,fontWeight:600}}>
                  {isEditing?'완료':'수정'}
                </button>
                {!isFirst&&<button onClick={()=>updateEvent({...event,rounds:event.rounds.filter(x=>x.id!==r.id)})} style={{background:C.redBg,border:'none',borderRadius:8,color:C.red,cursor:'pointer',width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',fontSize:14}}>×</button>}
              </div>
            </div>
            {isEditing&&(
              <div className="fade-up">
                {useFeeConfig?(
                  <div style={{fontSize:12,color:C.textMid,background:C.accentBg,borderRadius:10,padding:'8px 12px',marginBottom:12}}>금액은 위 정산 방식 설정에서 관리됩니다</div>
                ):(
                  <Field label="금액 (원)" value={editAmount} onChange={v=>setEditAmount(v.replace(/[^0-9]/g,''))} placeholder="150000" inputMode="numeric"/>
                )}
                <div style={{fontSize:12,color:C.textMid,fontWeight:700,marginBottom:8}}>참여자 ({r.members.length}명)</div>
                {useGroupChips&&chipGroupSections?(
                  <>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
                      <button onClick={()=>updateRound(r.id,{members:[...presentMembers]})} style={{padding:'5px 9px',borderRadius:12,border:`1.5px solid ${C.accent}`,cursor:'pointer',fontSize:11,background:C.accentBg,color:C.accent,fontWeight:700}}>전체</button>
                    </div>
                    {chipGroupSections.map(section=>(
                      <div key={section.name} style={{marginBottom:8}}>
                        <div style={{fontSize:11,fontWeight:700,color:C.textDim,marginBottom:4}}>{section.name}</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                          {section.keys.map(k=>{
                            const sel=r.members.includes(k);
                            return <button key={k} onClick={()=>updateRound(r.id,{members:sel?r.members.filter(x=>x!==k):[...r.members,k]})} style={{padding:'5px 9px',borderRadius:12,border:`1.5px solid ${sel?C.accent:C.border}`,cursor:'pointer',fontSize:12,fontWeight:600,background:sel?C.accentBg:C.cardBg,color:sel?C.accent:C.textMid}}>{mm[k]||k}</button>;
                          })}
                        </div>
                      </div>
                    ))}
                  </>
                ):(
                  <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                    <button onClick={()=>updateRound(r.id,{members:[...presentMembers]})} style={{padding:'5px 9px',borderRadius:12,border:`1.5px solid ${C.accent}`,cursor:'pointer',fontSize:11,background:C.accentBg,color:C.accent,fontWeight:700}}>전체</button>
                    {presentMembers.map(k=>{
                      const sel=r.members.includes(k);
                      return <button key={k} onClick={()=>updateRound(r.id,{members:sel?r.members.filter(x=>x!==k):[...r.members,k]})} style={{padding:'5px 9px',borderRadius:12,border:`1.5px solid ${sel?C.accent:C.border}`,cursor:'pointer',fontSize:12,fontWeight:600,background:sel?C.accentBg:C.cardBg,color:sel?C.accent:C.textMid}}>{mm[k]||k}</button>;
                    })}
                  </div>
                )}
                <div style={{marginTop:14,borderTop:`1px solid ${C.border}`,paddingTop:12}}>
                  <div style={{fontSize:12,color:C.textMid,fontWeight:700,marginBottom:6}}>임시 인원 ({(r.extraMembers||[]).length}명)</div>
                  <div style={{fontSize:11,color:C.orange,marginBottom:8,lineHeight:1.5}}>임시 인원은 카톡 공유 링크에 포함되지 않아요. 분담금을 직접 알려주세요.</div>
                  {(r.extraMembers||[]).length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
                    {(r.extraMembers||[]).map((em,ei)=>(
                      <div key={ei} style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:12,background:C.orange+'20',border:`1.5px solid ${C.orange}50`}}>
                        <span style={{fontSize:10,fontWeight:800,color:C.orange}}>임시</span>
                        <span style={{fontSize:12,color:C.text,fontWeight:600}}>{em.name}</span>
                        <button onClick={()=>updateRound(r.id,{extraMembers:(r.extraMembers||[]).filter((_,j)=>j!==ei)})} style={{background:'none',border:'none',cursor:'pointer',color:C.textMid,fontSize:14,lineHeight:1,padding:'0 0 0 2px'}}>×</button>
                      </div>
                    ))}
                  </div>}
                  <div style={{display:'flex',gap:6}}>
                    <input value={extraInput} onChange={e=>setExtraInput(e.target.value)} placeholder="이름 입력" onKeyDown={e=>{if(e.key==='Enter'&&extraInput.trim()){updateRound(r.id,{extraMembers:[...(r.extraMembers||[]),{id:'em_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),name:extraInput.trim()}]});setExtraInput('');}}} style={{flex:1,padding:'7px 10px',borderRadius:8,border:`1.5px solid ${C.border}`,background:C.inputBg,fontSize:13,color:C.text,outline:'none'}}/>
                    <button onClick={()=>{if(extraInput.trim()){updateRound(r.id,{extraMembers:[...(r.extraMembers||[]),{id:'em_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),name:extraInput.trim()}]});setExtraInput('');}}} style={{padding:'7px 12px',borderRadius:8,background:C.orange+'20',border:`1.5px solid ${C.orange}50`,color:C.orange,fontWeight:700,fontSize:13,cursor:'pointer'}}>추가</button>
                  </div>
                  <div style={{marginTop:7,fontSize:11,color:C.textMid,lineHeight:1.5}}>명단에 빠진 멤버는 명단 관리 화면에서 추가해주세요. 그래야 다음 정산에도 쓸 수 있어요.</div>
                </div>
                <Btn onClick={()=>{
                  if(!useFeeConfig){const amt=Number(editAmount.replace(/[^0-9]/g,''));if(amt>0) updateRound(r.id,{amount:amt});}
                  setEditingId(null);
                }} disabled={!useFeeConfig&&!editAmount} style={{marginTop:12}} small>저장</Btn>
              </div>
            )}
          </div>
        );
      })}
      {event.rounds.length>0&&event.rounds[0].amount>0&&<div style={{textAlign:'right',fontSize:13,color:C.textMid,marginBottom:10}}>합계 <span style={{color:C.text,fontWeight:900}}>{fmtKRW(event.rounds.reduce((s,r)=>s+r.amount,0))}</span></div>}

      {/* 2차부터 추가 가능 */}
      {event.rounds.length>0&&event.rounds[0].amount>0&&(
        adding?(
          <div style={{background:C.inputBg,borderRadius:14,padding:14,border:`1.5px solid ${C.accent}30`}}>
            <Field label="차수 이름" value={label} onChange={setLabel} placeholder="2차, 노래방…"/>
            <Field label="총 금액 (원)" value={amount} onChange={v=>setAmount(v.replace(/[^0-9]/g,''))} placeholder="80000" inputMode="numeric"/>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:12,color:C.textMid,fontWeight:700,marginBottom:8}}>참여자 ({roundMembers.length}명)</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                <button onClick={()=>setRoundMembers([...presentMembers])} style={{padding:'5px 9px',borderRadius:12,border:`1.5px solid ${C.accent}`,cursor:'pointer',fontSize:11,background:C.accentBg,color:C.accent,fontWeight:700}}>전체</button>
                {presentMembers.map(k=>(
                  <button key={k} onClick={()=>setRoundMembers(s=>s.includes(k)?s.filter(x=>x!==k):[...s,k])} style={{padding:'5px 9px',borderRadius:12,border:`1.5px solid ${roundMembers.includes(k)?C.accent:C.border}`,cursor:'pointer',fontSize:12,fontWeight:600,background:roundMembers.includes(k)?C.accentBg:C.cardBg,color:roundMembers.includes(k)?C.accent:C.textMid}}>
                    {mm[k]||k}
                  </button>
                ))}
              </div>
            </div>
            <div style={{marginTop:4,marginBottom:4}}>
              <div style={{fontSize:12,color:C.textMid,fontWeight:700,marginBottom:6}}>임시 인원 ({roundExtraMembers.length}명)</div>
              <div style={{fontSize:11,color:C.orange,marginBottom:8,lineHeight:1.5}}>임시 인원은 카톡 공유 링크에 포함되지 않아요. 분담금을 직접 알려주세요.</div>
              {roundExtraMembers.length>0&&<div style={{display:'flex',flexWrap:'wrap',gap:5,marginBottom:8}}>
                {roundExtraMembers.map((em,ei)=>(
                  <div key={ei} style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',borderRadius:12,background:C.orange+'20',border:`1.5px solid ${C.orange}50`}}>
                    <span style={{fontSize:10,fontWeight:800,color:C.orange}}>임시</span>
                    <span style={{fontSize:12,color:C.text,fontWeight:600}}>{em.name}</span>
                    <button onClick={()=>setRoundExtraMembers(s=>s.filter((_,j)=>j!==ei))} style={{background:'none',border:'none',cursor:'pointer',color:C.textMid,fontSize:14,lineHeight:1,padding:'0 0 0 2px'}}>×</button>
                  </div>
                ))}
              </div>}
              <div style={{display:'flex',gap:6,marginBottom:6}}>
                <input value={roundExtraInput} onChange={e=>setRoundExtraInput(e.target.value)} placeholder="이름 입력" onKeyDown={e=>{if(e.key==='Enter'&&roundExtraInput.trim()){setRoundExtraMembers(s=>[...s,{id:'em_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),name:roundExtraInput.trim()}]);setRoundExtraInput('');}}} style={{flex:1,padding:'7px 10px',borderRadius:8,border:`1.5px solid ${C.border}`,background:C.inputBg,fontSize:13,color:C.text,outline:'none'}}/>
                <button onClick={()=>{if(roundExtraInput.trim()){setRoundExtraMembers(s=>[...s,{id:'em_'+Date.now()+'_'+Math.random().toString(36).slice(2,8),name:roundExtraInput.trim()}]);setRoundExtraInput('');}}} style={{padding:'7px 12px',borderRadius:8,background:C.orange+'20',border:`1.5px solid ${C.orange}50`,color:C.orange,fontWeight:700,fontSize:13,cursor:'pointer'}}>추가</button>
              </div>
              <div style={{fontSize:11,color:C.textMid,lineHeight:1.5}}>명단에 빠진 멤버는 명단 관리 화면에서 추가해주세요. 그래야 다음 정산에도 쓸 수 있어요.</div>
            </div>
            <div style={{display:'flex',gap:8,marginTop:12}}>
              <Btn variant="ghost" onClick={()=>setAdding(false)} style={{flex:1}}>취소</Btn>
              <Btn onClick={addRound} disabled={!label||!(Number(amount)>0)||roundMembers.length===0} style={{flex:2}}>추가</Btn>
            </div>
          </div>
        ):(
          <Btn variant="secondary" onClick={()=>{setAdding(true);setLabel(`${event.rounds.length+1}차`);}}>＋ 차수 추가</Btn>
        )
      )}
    </div>
  );
}

// ── ShareSection ───────────────────────────────────────────
function ShareSection({event,showToast}){
  const amounts=calcAmounts(event);
  const presentMembers=event.members.filter(k=>event.attendance[k]!==false);
  const unpaid=presentMembers.filter(k=>!event.payments?.[k]?.paid);

  const copy=async(text,label)=>{await copyText(text);showToast(`${label} 복사됐어요`);};

  const directLink=getLink(`code=${event.code}`);
  const fc=event.feeConfig;
  const paidFeeMembers=presentMembers.filter(k=>(event.paidFeeKeys||[]).includes(k));
  const unpaidFeeMembers=presentMembers.filter(k=>!(event.paidFeeKeys||[]).includes(k));
  const hasPaidLine=paidFeeMembers.length>0&&(fc?.paidFeeAmount||0)>0;
  const hasUnpaidLine=unpaidFeeMembers.length>0&&(fc?.unpaidFeeAmount||0)>0;
  const autoMsg=fc?.paidFeeAmount!=null&&(hasPaidLine||hasUnpaidLine)
    ?[`[${event.date} ${event.name}] 정산 안내`,'',
      ...(hasPaidLine?[`📌 학생회비 납부자: ${fmtKRW(fc.paidFeeAmount)}`]:[]),
      ...(hasUnpaidLine?[`📌 학생회비 미납자: ${fmtKRW(fc.unpaidFeeAmount)}`]:[]),
      '','아래 링크에서 내가 낼 돈을 확인하고 입금해주세요.','','(정산해 · 간편한 모임 정산 서비스)'].join('\n')
    :`[${event.date} ${event.name}] 정산 안내\n\n아래 링크에서 내가 낼 돈을 확인하고 입금해주세요.\n\n(정산해 · 간편한 모임 정산 서비스)`;

  const [editMode,setEditMode]=useState(false);
  const [editText,setEditText]=useState('');

  const startEdit=()=>{if(!editText)setEditText(autoMsg);setEditMode(true);};
  const getMsg=()=>`${editMode?editText:autoMsg}\n${directLink}`;

  return(
    <div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div style={{fontSize:12,color:C.textDim,fontWeight:600}}>공유 메시지</div>
        {!editMode?(
          <button onClick={startEdit} style={{fontSize:11,color:C.accent,background:'none',border:'none',cursor:'pointer',padding:'2px 4px',fontWeight:600}}>✏️ 편집</button>
        ):(
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setEditText(autoMsg)} style={{fontSize:11,color:C.textMid,background:'none',border:'none',cursor:'pointer',padding:'2px 4px',fontWeight:600}}>원래대로</button>
            <button onClick={()=>setEditMode(false)} style={{fontSize:11,color:C.accent,background:'none',border:'none',cursor:'pointer',padding:'2px 4px',fontWeight:600}}>완료</button>
          </div>
        )}
      </div>
      {editMode?(
        <textarea value={editText} onChange={e=>setEditText(e.target.value)} rows={6} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1.5px solid ${C.accent}`,background:C.inputBg,fontSize:13,color:C.text,lineHeight:1.85,resize:'vertical',outline:'none',boxSizing:'border-box',marginBottom:6}}/>
      ):(
        <div style={{background:C.inputBg,borderRadius:12,padding:'12px 14px',fontSize:12,color:C.textMid,lineHeight:1.85,marginBottom:8,whiteSpace:'pre-wrap',border:`1.5px solid ${C.border}`}}>{autoMsg}{'\n'}{directLink}</div>
      )}
      <div style={{display:'flex',gap:8,marginBottom:8}}>
        <Btn onClick={async()=>{const msg=getMsg();const shared=await shareText(msg);if(!shared){await copy(msg,'메시지');}else showToast('공유 완료');}} small style={{flex:2}}>💬 카톡 공유</Btn>
        <Btn onClick={()=>copy(directLink,'링크')} variant="secondary" small style={{flex:1}}>🔗 링크</Btn>
      </div>
      <Btn onClick={()=>copy(getMsg(),'메시지')} variant="ghost" small style={{marginBottom:16}}>📋 메시지 복사</Btn>
      {unpaid.length===0&&<div style={{textAlign:'center',color:C.green,fontWeight:900,fontSize:15,padding:'8px 0'}}>🎉 모두 완료!</div>}
    </div>
  );
}

// ── StatusSection ──────────────────────────────────────────
function StatusSection({event,updateEvent,groups,showToast}){
  const [sortByTime,setSortByTime]=useState(true);
  const mm=event.memberMap||{};
  const amounts=calcAmounts(event);
  const surplus=calcSurplus(event);
  const attendingMembers=event.members.filter(k=>event.attendance[k]!==false);
  const presentMembers=attendingMembers.filter(k=>(amounts[k]||0)>0);
  const zeroMembers=attendingMembers.filter(k=>(amounts[k]||0)===0);

  // 임시 인원 합산
  const extraAmounts={};
  const allExtraEntries=[]; // {key, name}
  (event.rounds||[]).forEach(r=>{
    if(!r.amount) return;
    const totalCount=(r.members?.length||0)+(r.extraMembers?.length||0);
    if(!totalCount) return;
    const share=Math.ceil(r.amount/totalCount);
    (r.extraMembers||[]).forEach((em,ei)=>{
      const k=extraKey(r.id,em,ei);
      extraAmounts[k]=(extraAmounts[k]||0)+share;
      if(!allExtraEntries.find(e=>e.key===k))
        allExtraEntries.push({key:k,name:em.name});
    });
  });

  const pc=presentMembers.filter(k=>event.payments?.[k]?.paid).length
           +allExtraEntries.filter(e=>event.payments?.[e.key]?.paid).length;
  const unpaidList=presentMembers.filter(k=>!event.payments?.[k]?.paid);
  const directLink=getLink(`code=${event.code}`);
  const nl='\n';
  const acct=event.account?.bank?('💳 '+event.account.bank+' '+event.account.number+' ('+event.account.holder+')'):'';
  const nudgeMsg=unpaidList.length===0?'':['['+event.name+'] 콕 찌르기',nl,...unpaidList.map(k=>('• '+(mm[k]||k)+'  '+fmtKRW(amounts[k]||0))),acct,nl,directLink].filter(Boolean).join(nl);

  const toggle=k=>{
    const cur=event.payments?.[k]?.paid;
    updateEvent({...event,payments:{...event.payments,[k]:cur
      ?{paid:false,requested:false,time:null,by:null}
      :{paid:true,requested:false,time:new Date().toISOString(),by:'admin'}
    }});
  };

  const useGroupView=(groups||[]).length>1;
  const groupSections=React.useMemo(()=>{
    if(!useGroupView) return null;
    const pMembers=event.members.filter(k=>event.attendance[k]!==false).filter(k=>(amounts[k]||0)>0);
    const assigned=new Set();
    const sortSection=(keys)=>sortByTime
      ? sortByRequested(keys,event.payments)
      : keys;
    const sections=(groups||[]).map(g=>{
      const gKeys=new Set((g.members||[]).map(m=>m.name+(m.sid?`_${m.sid}`:'')));
      const keys=pMembers.filter(k=>gKeys.has(k));
      keys.forEach(k=>assigned.add(k));
      return {name:g.name,keys:sortSection(keys)};
    }).filter(s=>s.keys.length>0);
    const unassigned=pMembers.filter(k=>!assigned.has(k));
    if(unassigned.length>0) sections.push({name:'미분류',keys:sortSection(unassigned)});
    // 임시 인원 섹션 추가 (useMemo 내부에서 직접 계산)
    const localExtraEntries=[];
    (event.rounds||[]).forEach(r=>{
      if(!r.amount) return;
      const totalCount=(r.members?.length||0)+(r.extraMembers?.length||0);
      if(!totalCount) return;
      (r.extraMembers||[]).forEach((em,ei)=>{
        const k=extraKey(r.id,em,ei);
        if(!localExtraEntries.find(e=>e.key===k)) localExtraEntries.push({key:k});
      });
    });
    if(localExtraEntries.length>0){
      const extraKeys=sortSection(localExtraEntries.map(e=>e.key));
      sections.push({name:'임시 인원',keys:extraKeys,isExtra:true});
    }
    return sections;
  },[useGroupView,groups,event.members,event.attendance,event.payments,event.rounds,sortByTime]);

  const sortList=(keys)=>sortByTime
    ? sortByRequested(keys,event.payments)
    : keys;
  const sortedMain=useGroupView?null:sortList(presentMembers);
  const sortedExtra=useGroupView?null:sortList(allExtraEntries.map(e=>e.key));

  const MemberCard=({k,isExtra=false})=>{
    const p=event.payments?.[k]; const paid=p?.paid;
    const reqested=!paid&&!!p?.requested;
    const displayName=isExtra
      ? (allExtraEntries.find(e=>e.key===k)?.name || k)
      : (mm[k]||k);
    const displayAmount=isExtra ? (extraAmounts[k]||0) : (amounts[k]||0);
    const canDunning=!paid&&!reqested&&!!event.account?.bank;
    const dunning=async e=>{
      e.stopPropagation();
      const msg=buildDunningMsg({name:displayName,eventName:event.name,amount:displayAmount,account:event.account,link:directLink});
      const shared=await shareText(msg);
      if(!shared){await copyText(msg);showToast('독촉 메시지 복사됐어요');}
      else showToast('공유 완료');
    };
    return(
      <div style={{background:C.cardBg,borderRadius:12,marginBottom:6,boxShadow:paid?`0 0 0 2px ${C.green}40`:reqested?`0 0 0 2px ${C.yellow}40`:C.shadow,overflow:'hidden'}}>
        <div onClick={()=>toggle(k)} className="press" style={{padding:'11px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',background:paid?C.green:reqested?C.yellowBg:C.redBg,color:paid?'#fff':reqested?C.yellow:C.red,fontWeight:900,fontSize:14}}>{paid?'O':reqested?'△':'X'}</div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <span style={{fontWeight:600,color:C.text,fontSize:13}}>{displayName}</span>
                {isExtra&&<span style={{fontSize:10,fontWeight:800,color:C.orange,background:C.orange+'20',borderRadius:6,padding:'1px 5px'}}>임시</span>}
              </div>
              {paid&&p?.time&&<div style={{fontSize:11,color:C.textDim}}>{fmtTime(p.time)}{p.by==='admin'?' · 관리자':p.by==='archive'?' · 종료처리':''}</div>}
              {!paid&&p?.requestedAt&&<div style={{fontSize:11,color:C.textDim}}>{fmtRelTime(p.requestedAt)} · 복사함</div>}
            </div>
          </div>
          <div style={{color:C.accent,fontWeight:900,fontSize:13}}>{fmtKRW(displayAmount)}</div>
        </div>
        {canDunning&&(
          <div style={{borderTop:`1px solid ${C.border}`,padding:'6px 14px',display:'flex',justifyContent:'flex-end'}}>
            <button onClick={dunning} style={{fontSize:12,color:C.orange,background:C.orange+'18',border:'none',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontWeight:700}}>💬 독촉</button>
          </div>
        )}
      </div>
    );
  };

  const totalCount=presentMembers.length+allExtraEntries.length;
  const allKeys=[...presentMembers,...allExtraEntries.map(e=>e.key)];
  const requestedKeys=allKeys.filter(k=>!event.payments?.[k]?.paid&&event.payments?.[k]?.requested);
  const unpaidXKeys=allKeys.filter(k=>!event.payments?.[k]?.paid&&!event.payments?.[k]?.requested);
  const unpaidXList=unpaidXKeys.map(k=>{
    const isExtra=allExtraEntries.some(e=>e.key===k);
    return {name:isExtra?(allExtraEntries.find(e=>e.key===k)?.name||k):(mm[k]||k),amount:isExtra?(extraAmounts[k]||0):(amounts[k]||0)};
  });
  const [confirmBulk,setConfirmBulk]=useState(false);
  const [dunningOpen,setDunningOpen]=useState(false);

  const applyBulkConfirm=()=>{
    const now=new Date().toISOString();
    const newPayments={...event.payments};
    requestedKeys.forEach(k=>{newPayments[k]={paid:true,requested:false,time:now,by:'admin'};});
    updateEvent({...event,payments:newPayments});
    setConfirmBulk(false);
  };

  return(
    <div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        {[[totalCount-pc,'미입금',C.red,C.redBg]].map(([v,l,c,bg])=>(
          <div key={l} style={{flex:1,background:bg,borderRadius:12,padding:'11px 8px',textAlign:'center',border:`1.5px solid ${c}30`}}>
            <div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div>
            <div style={{fontSize:11,color:c,marginTop:2,fontWeight:600}}>{l}</div>
          </div>
        ))}
      </div>
      {unpaidXKeys.length>0&&event.account?.bank&&(
        <button onClick={()=>setDunningOpen(true)} className="press" style={{width:'100%',padding:'12px',borderRadius:12,background:C.orange+'15',border:`1.5px solid ${C.orange}40`,color:C.orange,fontWeight:800,fontSize:13,cursor:'pointer',marginBottom:8}}>
          📢 미납자 {unpaidXKeys.length}명 일괄 독촉
        </button>
      )}
      {requestedKeys.length>0&&(
        <button onClick={()=>setConfirmBulk(true)} className="press" style={{width:'100%',padding:'12px',borderRadius:12,background:C.yellowBg,border:`1.5px solid ${C.yellow}40`,color:C.yellow,fontWeight:800,fontSize:13,cursor:'pointer',marginBottom:10}}>
          남은 요청 {requestedKeys.length}명 모두 확인 완료
        </button>
      )}
